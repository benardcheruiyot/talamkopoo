name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Backend install and tests
        working-directory: backend
        run: |
          npm ci
          npm test -- --passWithNoTests

      - name: Frontend install and production build
        working-directory: frontend
        run: |
          npm ci
          npm run build

  deploy:
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect SSH auth mode
        id: auth_mode
        shell: bash
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          set -euo pipefail

          key_trimmed="$(printf '%s' "${VPS_SSH_KEY}" | tr -d '[:space:]')"
          password_trimmed="$(printf '%s' "${VPS_PASSWORD}" | tr -d '[:space:]')"

          if [ -n "$key_trimmed" ]; then
            echo "use_ssh_key=true" >> "$GITHUB_OUTPUT"
            echo "use_password=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -n "$password_trimmed" ]; then
            echo "use_ssh_key=false" >> "$GITHUB_OUTPUT"
            echo "use_password=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "use_ssh_key=false" >> "$GITHUB_OUTPUT"
          echo "use_password=false" >> "$GITHUB_OUTPUT"
          echo "Missing SSH authentication. Configure VPS_SSH_KEY or VPS_PASSWORD."
          exit 1

      - name: Validate SSH authentication secrets
        if: ${{ steps.auth_mode.outputs.use_ssh_key != 'true' && steps.auth_mode.outputs.use_password != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
            echo "Missing SSH authentication. Configure VPS_SSH_KEY or VPS_PASSWORD."
            exit 1

      - name: Setup SSH agent
        if: ${{ steps.auth_mode.outputs.use_ssh_key == 'true' }}
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Install sshpass (password fallback)
        if: ${{ steps.auth_mode.outputs.use_password == 'true' }}
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Prepare env files from GitHub Secrets
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${{ secrets.BACKEND_ENV_FILE }}" ]; then
            echo "Missing required secret: BACKEND_ENV_FILE"
            exit 1
          fi

          if [ -z "${{ secrets.FRONTEND_ENV_FILE }}" ]; then
            echo "Missing required secret: FRONTEND_ENV_FILE"
            exit 1
          fi

          printf '%s' "${{ secrets.BACKEND_ENV_FILE }}" > backend/.env
          printf '%s' "${{ secrets.FRONTEND_ENV_FILE }}" > frontend/.env

      - name: Run full remote recovery deployment
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}
          SSH_PASSWORD: ${{ secrets.VPS_PASSWORD }}
          APP_DOMAIN: ${{ vars.APP_DOMAIN }}
          CERTBOT_EMAIL: ${{ vars.CERTBOT_EMAIL }}
          DEPLOY_REPO: ${{ vars.DEPLOY_REPO }}
          DEPLOY_BRANCH: ${{ vars.DEPLOY_BRANCH }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          PM2_APP_NAME: ${{ vars.PM2_APP_NAME }}
          BACKEND_PORT: ${{ vars.BACKEND_PORT }}
        run: |
          set -euo pipefail

          if [ -z "${APP_DOMAIN:-}" ]; then
            echo "Missing required variable: APP_DOMAIN"
            exit 1
          fi

          if [ -z "${CERTBOT_EMAIL:-}" ]; then
            echo "Missing required variable: CERTBOT_EMAIL"
            exit 1
          fi

          chmod +x ./deploy_and_restart.sh

          ARGS=(
            --host "$DEPLOY_HOST"
            --domain "$APP_DOMAIN"
            --email "$CERTBOT_EMAIL"
          )

          if [ -n "${DEPLOY_REPO:-}" ]; then
            ARGS+=(--repo "$DEPLOY_REPO")
          fi

          if [ -n "${DEPLOY_BRANCH:-}" ]; then
            ARGS+=(--branch "$DEPLOY_BRANCH")
          fi

          if [ -n "${DEPLOY_PATH:-}" ]; then
            ARGS+=(--project-dir "$DEPLOY_PATH")
          fi

          if [ -n "${PM2_APP_NAME:-}" ]; then
            ARGS+=(--pm2-app-name "$PM2_APP_NAME")
          fi

          if [ -n "${BACKEND_PORT:-}" ]; then
            ARGS+=(--backend-port "$BACKEND_PORT")
          fi

          ./deploy_and_restart.sh "${ARGS[@]}"

      - name: Verify domain and API health
        shell: bash
        env:
          APP_DOMAIN: ${{ vars.APP_DOMAIN }}
        run: |
          set -euo pipefail
          if [ -z "${APP_DOMAIN:-}" ]; then
            echo "Missing required variable: APP_DOMAIN"
            exit 1
          fi

          DOMAIN="$APP_DOMAIN"
          ok=0

          for i in $(seq 1 18); do
            if curl -fsS --max-time 10 "https://$DOMAIN/api/health" >/dev/null; then
              ok=1
              break
            fi

            if curl -fsS --max-time 10 "http://$DOMAIN/api/health" >/dev/null; then
              ok=1
              break
            fi

            echo "Public health check retry ${i}/18"
            sleep 10
          done

          if [ "$ok" -ne 1 ]; then
            echo "Public endpoint did not become healthy in time: $DOMAIN"
            exit 1
          fi

name: Promote To Production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy to production
        required: true
        default: main

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Trigger production deployment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run deploy-production.yml --ref "${{ github.event.inputs.ref }}"

name: Diagnose Production

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    env:
      PM2_APP_NAME: ${{ vars.PM2_APP_NAME }}
      APP_DOMAIN: ${{ vars.APP_DOMAIN }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
      BACKEND_PORT: ${{ vars.BACKEND_PORT }}

    steps:
      - name: Run VPS diagnostics
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set +e

            APP_NAME="${PM2_APP_NAME:-backend}"
            APP_ROOT="${DEPLOY_PATH:-}"
            BACKEND_DIR=""
            if [ -n "$APP_ROOT" ]; then
              BACKEND_DIR="$APP_ROOT/backend"
            fi
            DOMAIN="${APP_DOMAIN:-}"
            PORT="${BACKEND_PORT:-5002}"

            echo "===== BASIC ====="
            date
            hostname
            whoami
            uname -a

            echo "===== PM2 ====="
            pm2 status || true
            pm2 logs "$APP_NAME" --lines 120 --nostream || true

            echo "===== BACKEND PORT / HEALTH ====="
            ss -ltnp | grep -E ":80|:443|:${PORT}" || true
            curl -i -m 10 "http://127.0.0.1:${PORT}/api/health" || true

            echo "===== PUSH SUBSCRIPTIONS ====="
            if [ -n "$BACKEND_DIR" ] && [ -f "$BACKEND_DIR/data/push-subscriptions.json" ]; then
              ls -lh "$BACKEND_DIR/data/push-subscriptions.json" || true
              node -e "const fs=require('fs');const p=process.argv[1];const d=JSON.parse(fs.readFileSync(p,'utf8')||'{}');console.log('subscriptions_count=' + Object.keys(d).length);" "$BACKEND_DIR/data/push-subscriptions.json" || true
            else
              echo "No push-subscriptions.json file found"
            fi

            echo "===== BACKEND ENV (SAFE KEYS ONLY) ====="
            if [ -n "$BACKEND_DIR" ]; then
              grep -E '^(NODE_ENV|PORT|FRONTEND_URL|MPESA_CALLBACK_URL)=' "$BACKEND_DIR/.env" || true
            else
              echo "DEPLOY_PATH not set; skipping backend env read"
            fi

            echo "===== NGINX STATUS ====="
            sudo -n nginx -t || echo "sudo nginx -t failed (needs sudo privileges)"
            sudo -n systemctl status nginx --no-pager -l || true

            echo "===== NGINX SITES (SERVER_NAME + PROXY_PASS) ====="
            sudo -n grep -RInE 'server_name|proxy_pass|root|listen 443|listen 80' /etc/nginx/sites-enabled /etc/nginx/sites-available || true

            echo "===== DOMAIN PROBES FROM VPS ====="
            if [ -n "$DOMAIN" ]; then
              curl -I -m 10 "http://$DOMAIN" || true
              curl -k -I -m 10 "https://$DOMAIN" || true
            else
              echo "APP_DOMAIN not set; skipping public domain probes"
            fi

            echo "===== TLS CERT SUBJECT ====="
            if [ -n "$DOMAIN" ]; then
              echo | openssl s_client -servername "$DOMAIN" -connect "$DOMAIN":443 2>/dev/null | openssl x509 -noout -subject -issuer -dates || true
            else
              echo "APP_DOMAIN not set; skipping TLS cert check"
            fi